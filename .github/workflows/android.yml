name: Android CI

on:
  push:
    branches: [ main, devin/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 24 + CMake 3.22.1
        shell: bash
        run: |
          set -eux
          # Accept licenses without tripping up `yes` on a broken pipe.
          for _ in $(seq 1 30); do echo y; done | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "ndk;24.0.8215888" "cmake;3.22.1" \
                               "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('app/**/*.gradle*', 'app/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        working-directory: app
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: app
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8'
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: winlator-debug-apk
          path: app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            app/app/build/outputs/logs/**
            app/build/reports/**
          if-no-files-found: ignore
          retention-days: 14
